<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#4a90d9" />
    <title>きっずゲーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg1: #fff6e8;
        --bg2: #e8f4ff;
        --ink: #2c3e50;
        --muted: #5a6a7a;
        --card-shadow: 0 12px 32px rgba(44, 62, 80, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, #ffe8b8 0%, transparent 40%),
          radial-gradient(circle at 85% 10%, #c8e6ff 0%, transparent 35%),
          radial-gradient(circle at 50% 100%, #d4f5d4 0%, transparent 40%),
          linear-gradient(160deg, var(--bg1), var(--bg2));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .portal {
        width: min(920px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 3rem);
        letter-spacing: 0.04em;
      }

      .subtitle {
        margin: 0 0 32px;
        color: var(--muted);
        font-size: clamp(1rem, 2.8vw, 1.25rem);
      }

      .games {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }

      .game-card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 28px;
        padding: 28px 22px 24px;
        box-shadow: var(--card-shadow);
        border: 3px solid transparent;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translateY(-4px) scale(1.02);
        border-color: #4a90d9;
        box-shadow: 0 18px 40px rgba(44, 62, 80, 0.16);
        outline: none;
      }

      .game-card.cook:hover,
      .game-card.cook:focus-visible {
        border-color: #e67e22;
      }

      .icon {
        font-size: 3.5rem;
        line-height: 1;
        margin-bottom: 12px;
      }

      .game-card h2 {
        margin: 0 0 8px;
        font-size: 1.45rem;
      }

      .game-card p {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .badge {
        display: inline-block;
        margin-top: 16px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        background: #e8f4ff;
        color: #2b6cb0;
      }

      .game-card.cook .badge {
        background: #fff0e0;
        color: #c05621;
      }
    </style>
  </head>
  <body>
    <main class="portal">
      <h1>🎮 きっずゲーム</h1>
      <p class="subtitle">あそびたいゲームをえらんでね！</p>

      <div class="games">
        <a class="game-card vehicles" href="./vehicles/">
          <div class="icon">🚜</div>
          <h2>さぎょうしゃ</h2>
          <p>ショベルカー・トラクター・ブルドーザーであそぼう！</p>
          <span class="badge">はじめる</span>
        </a>

        <a class="game-card cook" href="./cook/">
          <div class="icon">👨‍🍳</div>
          <h2>おうちでコックさん</h2>
          <p>ハンバーグ・オムライス・ピザをつくろう！</p>
          <span class="badge">はじめる</span>
        </a>
      </div>
    </main>
  </body>
</html>
